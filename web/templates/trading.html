        async function runStrategy(name) {
            const btn = event.target.closest('.btn-action.btn-run');
            const originalHtml = btn ? btn.innerHTML : '';
            if (btn) {
                btn.innerHTML = '<i class="bi bi-arrow-repeat spin"></i> 执行中';
                btn.disabled = true;
            }

            try {
                const response = await fetch('/api/strategy', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'run',
                        strategy_type: name
                    })
                });
                const data = await response.json();

                if (data.success) {
                    const result = data.result || {};
                    const signal = result.signal;
                    if (signal && signal.type && signal.type !== 'hold') {
                        showToast('success', '策略执行成功', `${signal.type.toUpperCase()} ${signal.symbol || ''} @ ${signal.price || ''}`);
                    } else {
                        showToast('info', '策略执行完成', '当前无交易信号');
                    }
                    loadStrategies();
                } else {
                    showToast('error', '执行失败', data.error || '未知错误');
                    if (btn) {
                        btn.innerHTML = originalHtml;
                        btn.disabled = false;
                    }

                showToast('error', '执行失败', error.message || '网络错误');

                    btn.disabled = false;
                }

            const symbol = document.getElementById('trade-symbol').value;
            const orderType = document.getElementById('order-type').value;
            const amount = parseFloat(document.getElementById('trade-amount').value);
            const price = orderType === 'limit' ? parseFloat(document.getElementById('limit-price').value) : currentPrice;

            if (!amount || amount <= 0) {
                alert('请输入有效的数量');
                return;
            }

            if (orderType === 'limit' && (!price || price <= 0)) {
                alert('请输入有效的价格');
                return;
            }

            try {
                const response = await fetch('/api/order', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        symbol: symbol,
                        side: side,
                        type: orderType,
                        amount: amount,
                        price: price
                    })
                });
                const data = await response.json();

                if (data.success) {
                    alert(data.message);
                    loadMarketData(symbol);
                    loadOpenOrders();
                } else {
                    alert('下单失败: ' + data.error);
                }
            } catch (error) {
                alert('下单失败: ' + error);
            }
        }

        function toggleStrategyPanel(name) {
            const panel = document.getElementById('panel-' + name);
            const card = document.getElementById('card-' + name);

            if (!panel) return;

            // 如果点击的是已经展开的面板，则收起
            if (expandedCard === name) {
                panel.classList.remove('active');
                card.classList.remove('expanded');
                expandedCard = null;
                return;
            }

            // 收起之前展开的面板
            if (expandedCard) {
                const prevPanel = document.getElementById('panel-' + expandedCard);
                const prevCard = document.getElementById('card-' + expandedCard);
                if (prevPanel) prevPanel.classList.remove('active');
                if (prevCard) prevCard.classList.remove('expanded');
            }

            // 展开新面板
            panel.classList.add('active');
            card.classList.add('expanded');
            expandedCard = name;

            // 滚动到视图中
            setTimeout(() => {
                card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }, 100);
        }

                    .then(data => {
                        const s = data.strategies.find(s => s.name === name);
                        if (s) {
                            currentStrategyData = s;
                            fetchStrategyLogs(name, s);
                        }
                    });
            }
        }

        function fetchStrategyLogs(name, strategy) {
            // 获取策略运行日志
            fetch(`/api/strategy/${name}/logs`)
                .then(r => r.json())
                .then(data => {
                    if (data.success) {
                        strategy.logs = data.trades || [];
                        strategy.summary = data.summary || {};
                        strategy.state = data.state || {};
                    }
                    renderStrategyDetail(strategy);
                })
                .catch(err => {
                    console.error('获取策略日志失败:', err);
                    renderStrategyDetail(strategy);
                });
        }

        function renderStrategyLogs(logs) {
            const container = document.getElementById('logs-container');
            if (!container) return;

            if (logs.length === 0) {
                container.innerHTML = '<div class="empty-state"><i class="bi bi-inbox"></i><p>暂无交易记录</p></div>';
                return;
            }

            let html = '<div class="logs-list">';
            logs.forEach(log => {
                const side = log.side === 'buy' ? '买入' : '卖出';
                const sideClass = log.side === 'buy' ? 'positive' : 'negative';
                const date = new Date(log.created_at).toLocaleString('zh-CN');
                html += `
                    <div class="log-item">
                        <div class="log-side ${sideClass}">${side}</div>
                        <div class="log-info">
                            <span class="log-symbol">${log.symbol}</span>
                            <span class="log-amount">${log.amount} @ ${log.price}</span>
                        </div>
                        <div class="log-meta">
                            <span class="log-total">${log.total?.toFixed(2)} USDT</span>
                            <span class="log-date">${date}</span>
                        </div>
                    </div>
                `;
            });
            html += '</div>';
            container.innerHTML = html;
        }

            const detail = strategyDetails[strategyName];
            if (!detail || !detail.presets) return;

            // 获取当前选择的交易对
            const symbolSelect = document.getElementById('param-symbol-' + strategyName);
            const currentSymbol = symbolSelect ? symbolSelect.value : 'ETHUSDT';

            // 获取该交易对的预设，没有则用ETHUSDT的
            const symbolPresets = detail.presets[currentSymbol] || detail.presets['ETHUSDT'];
            if (!symbolPresets || !symbolPresets[presetType]) return;

            const preset = symbolPresets[presetType];

            // 更新预设按钮状态
            document.querySelectorAll('.param-preset-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.textContent === (presetType === 'conservative' ? '保守' : presetType === 'moderate' ? '稳健' : '激进')) {

            // 应用预设参数 (使用带策略名称的ID格式)

            if (strategyName === 'GridStrategy') {

                params = {
                    symbol: getId('symbol').value,
                    leverage: parseInt(getId('leverage').value),
                    position_value: parseFloat(getId('position_value').value),
                    stop_loss_pct: parseFloat(getId('stop_loss_pct').value),
                    take_profit_1: parseFloat(getId('take_profit_1').value),
                    take_profit_1_ratio: parseFloat(getId('take_profit_1_ratio').value),
                    take_profit_2: parseFloat(getId('take_profit_2').value),
                    pending_timeout: parseInt(getId('pending_timeout').value),
                    cooldown_seconds: parseInt(getId('cooldown_seconds').value),
                    adx_threshold: parseFloat(getId('adx_threshold').value)
                };
            }

            fetch('/api/strategy', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    action: 'update',
                    strategy_type: typeMap[name],
                    params: params
                })
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    showToast('success', '保存成功', '策略参数已更新');
                    closeStrategyModal();
                    loadStrategies();
                } else {
                    showToast('error', '保存失败', data.error || '未知错误');
                }
            })
            .catch(err => {
                console.error('保存参数失败:', err);
                showToast('error', '保存失败', err.message || '网络错误');
            });
        }

        // 修改策略列表，添加查看详情按钮
        const originalLoadStrategies = loadStrategies;
    </script>
</body>
</html>
