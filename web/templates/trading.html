<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradingBot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/animate.css@4.1.1/animate.min.css" rel="stylesheet">

    <style>
        :root {
            --bg-primary: linear-gradient(135deg, #e0f7fa 0%, #b2ebf2 30%, #e8f5e9 70%, #c8e6c9 100%);
            --bg-secondary: rgba(255, 255, 255, 0.7);
            --bg-card: rgba(255, 255, 255, 0.6);
            --bg-card-hover: rgba(255, 255, 255, 0.85);
            --bg-glass: rgba(255, 255, 255, 0.4);
            --text-primary: #1a4a4a;
            --text-secondary: #4a7c7c;
            --text-muted: #6b9999;
            --border-color: rgba(0, 150, 150, 0.15);

            --gradient-primary: linear-gradient(135deg, #00bcd4 0%, #009688 100%);
            --gradient-teal: linear-gradient(135deg, #80cbc4 0%, #4db6ac 100%);
            --gradient-success: linear-gradient(135deg, #26a69a 0%, #4db6ac 100%);
            --gradient-danger: linear-gradient(135deg, #ef5350 0%, #e57373 100%);

            --accent-green: #00897b;
            --accent-red: #e53935;
            --accent-blue: #00acc1;
            --accent-yellow: #ffb300;
            --accent-purple: #7e57c2;

            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            --shadow-glow-green: 0 0 20px rgba(16, 185, 129, 0.3);
            --shadow-glow-red: 0 0 20px rgba(239, 68, 68, 0.3);
            --shadow-glow-blue: 0 0 20px rgba(59, 130, 246, 0.3);

            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background:
                radial-gradient(ellipse at 20% 20%, rgba(0, 188, 212, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(0, 150, 136, 0.15) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        /* 侧边栏 */
        .sidebar {
            position: fixed;
            top: 0; left: 0;
            width: 260px;
            height: 100vh;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-right: 1px solid var(--border-color);
            padding: 24px 16px;
            z-index: 100;
            display: flex;
            flex-direction: column;
        }

        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0 8px 24px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 24px;
        }

        .sidebar-logo-icon {
            width: 40px; height: 40px;
            background: var(--gradient-primary);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: var(--shadow-md);
        }

        .sidebar-logo h5 {
            font-weight: 700;
            font-size: 16px;
            background: var(--gradient-teal);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .sidebar-logo span {
            font-size: 11px;
            color: var(--text-muted);
            display: block;
        }

        .sidebar-nav .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            color: var(--text-secondary);
            text-decoration: none;
            border-radius: var(--radius-md);
            transition: all 0.3s ease;
            font-weight: 500;
            font-size: 14px;
        }

        .sidebar-nav .nav-link:hover {
            color: var(--text-primary);
            background: var(--bg-glass);
        }

        .sidebar-nav .nav-link.active {
            color: var(--text-primary);
            background: rgba(59, 130, 246, 0.15);
            border: 1px solid rgba(59, 130, 246, 0.2);
        }

        .sidebar-nav .nav-link i {
            font-size: 18px;
            width: 24px;
            text-align: center;
        }

        /* 主内容 */
        .main-content {
            margin-left: 260px;
            padding: 32px;
            min-height: 100vh;
        }

        .page-header {
            margin-bottom: 32px;
        }

        .page-header h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .page-header .subtitle {
            color: var(--text-muted);
            font-size: 14px;
        }

        /* 标签页 */
        .nav-tabs-custom {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 16px;
        }

        .tab-btn {
            padding: 12px 24px;
            background: var(--bg-glass);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tab-btn:hover {
            background: var(--bg-card-hover);
            color: var(--text-primary);
        }

        .tab-btn.active {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
            color: white;
        }

        .tab-btn i {
            font-size: 16px;
        }

        /* 卡片 */
        .glass-card {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(0, 180, 170, 0.15);
            border-radius: var(--radius-lg);
            transition: all 0.3s ease;
            box-shadow: 0 4px 16px rgba(0, 150, 150, 0.08);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            transition: all 0.3s ease;
        }

        .glass-card:hover {
            background: rgba(255, 255, 255, 0.75);
            border-color: rgba(0, 180, 170, 0.25);
        }

        /* 交易面板 */
        .trade-panel {
            padding: 28px;
        }

        .trade-panel-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border-color);
        }

        .trade-panel-icon {
            width: 48px; height: 48px;
            background: var(--gradient-primary);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .trade-panel-title {
            font-weight: 600;
            font-size: 18px;
        }

        .trade-panel-subtitle {
            font-size: 12px;
            color: var(--text-muted);
        }

        .trade-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }

        .amount-btn {
            padding: 10px 12px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .amount-btn:hover {
            background: var(--bg-card-hover);
            color: var(--text-primary);
        }

        .market-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
        }

        .market-card {
            background: var(--bg-glass);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 16px;
        }

        .form-label {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .form-control, .form-select {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 12px 16px;
            color: var(--text-primary);
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .form-control:focus, .form-select:focus {
            background: rgba(255, 255, 255, 0.9);
            border-color: var(--accent-teal);
            box-shadow: 0 0 0 3px rgba(0, 172, 193, 0.15);
            color: var(--text-primary);
        }

        .form-control::placeholder {
            color: var(--text-muted);
        }

        /* 价格显示 */
        .current-price-display {
            text-align: center;
            padding: 24px;
            background: var(--bg-glass);
            border-radius: var(--radius-md);
            margin-bottom: 24px;
        }

        .price-label {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .price-value {
            font-size: 36px;
            font-weight: 700;
        }

        .price-value.up { color: var(--accent-green); }
        .price-value.down { color: var(--accent-red); }

        /* 买入/卖出按钮 */
        .trade-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-top: 24px;
        }

        .btn-trade {
            padding: 16px 24px;
            border: none;
            border-radius: var(--radius-md);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-buy {
            background: var(--accent-green);
            color: white;
            box-shadow: var(--shadow-glow-green);
        }

        .btn-buy:hover {
            background: #059669;
            transform: translateY(-2px);
        }

        .btn-sell {
            background: var(--accent-red);
            color: white;
            box-shadow: var(--shadow-glow-red);
        }

        .btn-sell:hover {
            background: #dc2626;
            transform: translateY(-2px);
        }

        .btn-trade i {
            font-size: 18px;
        }

        /* 市场信息 */
        .market-panel {
            padding: 24px;
        }

        .market-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }

        .stat-item {
            padding: 16px;
            background: var(--bg-glass);
            border-radius: var(--radius-md);
            text-align: center;
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 18px;
            font-weight: 600;
        }

        /* 持仓 */
        .position-panel {
            padding: 24px;
        }

        .position-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            font-weight: 600;
            font-size: 16px;
        }

        .position-header i {
            color: var(--accent-blue);
        }

        .empty-state {
            text-align: center;
            padding: 48px 24px;
            color: var(--text-muted);
        }

        .empty-state i {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-state p {
            font-size: 14px;
        }

        /* Toast 通知系统 */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toast {
            min-width: 280px;
            padding: 14px 20px;
            border-radius: var(--radius-md);
            background: rgba(255, 255, 255, 0.75);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: center;
            gap: 12px;
            animation: toast-in 0.3s ease;
        }

        .toast.toast-success {
            border-left: 4px solid var(--accent-green);
        }

        .toast.toast-error {
            border-left: 4px solid var(--accent-red);
        }

        .toast.toast-info {
            border-left: 4px solid var(--accent-blue);
        }

        .toast-icon {
            font-size: 20px;
            flex-shrink: 0;
        }

        .toast-success .toast-icon { color: var(--accent-green); }
        .toast-error .toast-icon { color: var(--accent-red); }
        .toast-info .toast-icon { color: var(--accent-blue); }

        .toast-content {
            flex: 1;
        }

        .toast-title {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 2px;
        }

        .toast-message {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .toast-close {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 4px;
            font-size: 16px;
            transition: color 0.2s;
        }

        .toast-close:hover {
            color: var(--text-primary);
        }

        @keyframes toast-in {
            from {
                opacity: 0;
                transform: translateX(100px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes toast-out {
            from {
                opacity: 1;
                transform: translateX(0);
            }
            to {
                opacity: 0;
                transform: translateX(100px);
            }
        }

        /* 策略卡片 */
        .strategy-card {
            padding: 24px;
            height: 100%;
        }

        .strategy-card .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 0 0 16px;
            border-bottom: 1px solid var(--border-color);
            background: transparent;
            border: none;
            font-weight: 600;
            font-size: 16px;
        }

        .strategy-card .card-header i {
            color: var(--accent-purple);
        }

        /* 策略卡片 - 新版布局 */
        .strategies-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            align-items: stretch;
            width: 100%;
            min-width: 600px;
        }

        .strategy-card {
            background: var(--bg-glass);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            overflow: hidden;
            transition: all 0.3s ease;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .strategy-card:hover {
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }

        .strategy-card.running {
            border-color: rgba(16, 185, 129, 0.4);
        }

        .strategy-card.running::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-green), #38ef7d);
            animation: pulse-glow 2s infinite;
        }

        @keyframes pulse-glow {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }

        /* 加载动画 */
        .spin {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .strategy-card-header {
            padding: 16px 20px;
            background: linear-gradient(135deg, rgba(255,255,255,0.03) 0%, transparent 100%);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 16px;
            min-height: 80px;
        }

        .strategy-icon {
            width: 48px;
            height: 48px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
            position: relative;
        }

        .strategy-icon.grid { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .strategy-icon.dca { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); }
        .strategy-icon.trend { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .strategy-icon.funding { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
        .strategy-icon.scalping { background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); }
        .strategy-icon.adaptive { background: linear-gradient(135deg, #f59e0b 0%, #ef4444 100%); }

        /* 运行指示器 */
        .running-indicator {
            position: absolute;
            top: -2px;
            right: -2px;
            width: 10px;
            height: 10px;
            background: var(--accent-green);
            border-radius: 50%;
            border: 2px solid var(--bg-primary);
            animation: pulse-dot 1.5s infinite;
        }

        @keyframes pulse-dot {
            0%, 100% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7);
            }
            50% {
                transform: scale(1.1);
                box-shadow: 0 0 0 6px rgba(16, 185, 129, 0);
            }
        }

        .strategy-card-info {
            flex: 1;
            min-width: 0;
        }

        .strategy-card-title {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 6px;
        }

        .strategy-card-name {
            font-weight: 600;
            font-size: 16px;
            color: var(--text-primary);
        }

        .strategy-status-badge {
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .strategy-status-badge.running {
            background: rgba(16, 185, 129, 0.2);
            color: var(--accent-green);
        }

        .strategy-status-badge.stopped {
            background: rgba(107, 114, 128, 0.2);
            color: var(--text-muted);
        }

        .strategy-card-symbol {
            font-size: 12px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .strategy-card-symbol i {
            color: var(--accent-blue);
            font-size: 11px;
        }

        /* 快捷操作按钮 */
        .strategy-card-actions {
            display: flex;
            gap: 8px;
            margin-left: auto;
        }

        .btn-quick-action {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .btn-quick-action.start {
            background: rgba(16, 185, 129, 0.2);
            color: var(--accent-green);
        }

        .btn-quick-action.start:hover {
            background: var(--accent-green);
            color: white;
            transform: scale(1.1);
        }

        .btn-quick-action.stop {
            background: rgba(239, 68, 68, 0.2);
            color: var(--accent-red);
        }

        .btn-quick-action.stop:hover {
            background: var(--accent-red);
            color: white;
            transform: scale(1.1);
        }

        .strategy-card-detail-hint {
            margin-left: auto;
            color: var(--text-muted);
            font-size: 18px;
            opacity: 0.5;
            transition: all 0.2s;
        }

        .strategy-card:hover .strategy-card-detail-hint {
            opacity: 1;
            transform: translateX(4px);
            color: var(--accent-blue);
        }

        .strategy-card-body {
            padding: 16px 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .strategy-desc {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 12px;
            min-height: 42px;
        }

        .strategy-stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .strategy-params-summary {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .param-tag {
            background: rgba(102, 126, 234, 0.15);
            color: var(--text-secondary);
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 11px;
        }

        .strategy-stat {
            background: var(--bg-secondary);
            border-radius: var(--radius-sm);
            padding: 10px 12px;
            transition: all 0.2s;
        }

        .strategy-stat:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .strategy-stat-label {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .strategy-stat-value {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .strategy-stat-value.positive { color: var(--accent-green); }
        .strategy-stat-value.negative { color: var(--accent-red); }

        .strategy-card-footer {
            padding: 12px 16px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 10px;
            margin-top: auto;
        }

        .strategy-actions {
            display: flex;
            gap: 8px;
            flex: 1;
        }

        .btn-action {
            flex: 1;
            padding: 10px 16px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            background: rgba(255, 255, 255, 0.75);
            color: var(--text-primary);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            height: 38px;
        }

        .btn-action:hover {
            background: var(--bg-card-hover);
            border-color: var(--accent-blue);
        }

        .btn-action.start {
            background: rgba(16, 185, 129, 0.15);
            border-color: rgba(16, 185, 129, 0.4);
            color: var(--accent-green);
        }

        .btn-action.start:hover {
            background: rgba(16, 185, 129, 0.25);
        }

        .btn-action.stop {
            background: rgba(239, 68, 68, 0.15);
            border-color: rgba(239, 68, 68, 0.4);
            color: var(--accent-red);
        }

        .btn-action.stop:hover {
            background: rgba(239, 68, 68, 0.25);
        }

        .btn-action.running {
            background: rgba(59, 130, 246, 0.15);
            border-color: rgba(59, 130, 246, 0.4);
            color: var(--accent-blue);
        }

        /* 详情和运行按钮 */
        .btn-action.btn-detail {
            background: rgba(59, 130, 246, 0.1);
            border-color: rgba(59, 130, 246, 0.3);
            color: var(--accent-blue);
        }

        .btn-action.btn-detail:hover {
            background: rgba(59, 130, 246, 0.2);
            border-color: var(--accent-blue);
        }

        .btn-action.btn-run {
            background: rgba(139, 92, 246, 0.1);
            border-color: rgba(139, 92, 246, 0.3);
            color: var(--accent-purple);
        }

        .btn-action.btn-run:hover:not(:disabled) {
            background: rgba(139, 92, 246, 0.2);
            border-color: var(--accent-purple);
        }

        .btn-action.btn-run:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-action.btn-detail,
        .btn-action.btn-run {
            flex: 1;
        }

        /* 卡片展开图标 */
        .strategy-card-expand {
            margin-left: auto;
            color: var(--text-muted);
            font-size: 16px;
            transition: transform 0.3s ease;
        }

        .strategy-card.expanded .strategy-card-expand {
            transform: rotate(180deg);
        }

        .strategy-card-wrapper {
            display: flex;
            flex-direction: column;
        }

        /* 策略列表视图 */
        .strategy-list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px;
            border-bottom: 1px solid var(--border-color);
            background: linear-gradient(135deg, rgba(255,255,255,0.02) 0%, transparent 100%);
        }

        .strategy-list-header h4 {
            margin: 0 0 4px 0;
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .strategy-list-header h4 i {
            color: var(--accent-blue);
        }

        .strategy-list-header p {
            margin: 0;
            font-size: 13px;
            color: var(--text-muted);
        }

        .strategy-list-grid {
            padding: 24px;
        }

        /* 策略列表卡片 */
        .strategy-list-card {
            background: var(--bg-glass);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .strategy-list-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--card-accent, var(--accent-blue));
            opacity: 0;
            transition: opacity 0.3s;
        }

        .strategy-list-card:hover {
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.4);
        }

        .strategy-list-card:hover::before {
            opacity: 1;
        }

        .strategy-list-card.running::before {
            opacity: 1;
            animation: pulse-bar 2s infinite;
        }

        @keyframes pulse-bar {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }

        .strategy-list-card-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 14px;
        }

        .strategy-list-icon {
            width: 44px;
            height: 44px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: white;
            flex-shrink: 0;
        }

        .strategy-list-info {
            flex: 1;
            min-width: 0;
        }

        .strategy-list-name {
            font-weight: 600;
            font-size: 15px;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .strategy-list-desc {
            font-size: 12px;
            color: var(--text-muted);
            margin: 0;
        }

        .strategy-list-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 12px;
            border-top: 1px solid var(--border-color);
        }

        .strategy-list-symbol {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .strategy-list-symbol span {
            color: var(--accent-blue);
            font-weight: 500;
        }

        /* 策略详情视图 */
        .strategy-detail-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border-color);
            background: linear-gradient(135deg, rgba(255,255,255,0.03) 0%, transparent 100%);
        }

        .btn-back {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 16px;
            padding: 0;
            transition: color 0.2s;
        }

        .btn-back:hover {
            color: var(--text-primary);
        }

        .strategy-detail-title {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .strategy-detail-icon {
            width: 56px;
            height: 56px;
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: white;
        }

        .strategy-detail-title h3 {
            margin: 0 0 6px 0;
            font-size: 20px;
            font-weight: 600;
        }

        .strategy-detail-content {
            padding: 24px;
        }

        /* 详情内容区块 */
        .detail-section {
            margin-bottom: 28px;
        }

        .detail-section-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
        }

        .detail-section-title i {
            color: var(--accent-blue);
        }

        .detail-section-content {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.8;
        }

        .detail-section-content ul {
            margin: 0;
            padding-left: 20px;
        }

        .detail-section-content li {
            margin-bottom: 6px;
        }

        /* 运行统计 */
        .stats-summary {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
        }

        .stat-item {
            background: var(--bg-glass);
            border-radius: var(--radius-sm);
            padding: 12px 16px;
            text-align: center;
        }

        .stat-label {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .stat-value {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .stat-value.positive {
            color: var(--accent-green);
        }

        .stat-value.negative {
            color: var(--accent-red);
        }

        /* 日志列表 */
        .logs-container {
            max-height: 300px;
            overflow-y: auto;
        }

        .logs-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .log-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            background: var(--bg-glass);
            border-radius: var(--radius-sm);
            transition: background 0.2s;
        }

        .log-item:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .log-side {
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
        }

        .log-side.positive {
            background: rgba(16, 185, 129, 0.15);
            color: var(--accent-green);
        }

        .log-side.negative {
            background: rgba(239, 68, 68, 0.15);
            color: var(--accent-red);
        }

        .log-info {
            flex: 1;
            display: flex;
            gap: 12px;
        }

        .log-symbol {
            color: var(--text-primary);
            font-weight: 500;
        }

        .log-amount {
            color: var(--text-secondary);
            font-size: 13px;
        }

        .log-meta {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 2px;
        }

        .log-total {
            color: var(--text-primary);
            font-weight: 500;
        }

        .log-date {
            color: var(--text-muted);
            font-size: 11px;
        }

        .loading-state, .empty-state {
            text-align: center;
            padding: 24px;
            color: var(--text-muted);
        }

        .loading-state i, .empty-state i {
            font-size: 32px;
            margin-bottom: 8px;
            display: block;
        }

        /* 风险提示 */
        .risk-warning {
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid rgba(245, 158, 11, 0.3);
            border-radius: var(--radius-md);
            padding: 14px 16px;
            margin-top: 10px;
        }

        .risk-warning-title {
            color: var(--accent-yellow);
            font-weight: 600;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* 参数表格 */
        .param-table {
            width: 100%;
            border-collapse: collapse;
        }

        .param-table th,
        .param-table td {
            padding: 12px 14px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
            font-size: 13px;
        }

        .param-table th {
            color: var(--text-muted);
            font-weight: 500;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .param-table td:first-child {
            font-weight: 500;
            color: var(--text-primary);
            width: 35%;
        }

        .param-table td:nth-child(2) {
            color: var(--accent-blue);
            font-family: monospace;
            width: 25%;
        }

        /* 参数输入 */
        .param-input-group {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }

        .param-input-item {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 14px;
            transition: border-color 0.2s;
        }

        .param-input-item:focus-within {
            border-color: var(--accent-blue);
        }

        .param-input-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .param-input-name {
            font-weight: 500;
            font-size: 13px;
            color: var(--text-primary);
        }

        .param-input-name small {
            color: var(--text-muted);
            font-weight: normal;
        }

        .param-input-range {
            font-size: 11px;
            color: var(--text-muted);
        }

        .param-input-field {
            width: 100%;
            padding: 10px 12px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-size: 14px;
        }

        .param-input-field:focus {
            outline: none;
            border-color: var(--accent-blue);
        }

        .param-input-desc {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 6px;
        }

        /* 推荐参数 */
        .param-preset {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        .param-preset-btn {
            padding: 4px 10px;
            background: var(--bg-glass);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            font-size: 11px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }

        .param-preset-btn:hover {
            border-color: var(--accent-blue);
            color: var(--accent-blue);
        }

        .param-preset-btn.active {
            background: rgba(59, 130, 246, 0.15);
            border-color: var(--accent-blue);
            color: var(--accent-blue);
        }

        /* 保存按钮 */
        .btn-save {
            padding: 8px 20px;
            background: var(--accent-blue);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-save:hover {
            background: var(--accent-blue-hover, #3b82f6);
            transform: translateY(-1px);
        }

        .btn-save:active {
            transform: translateY(0);
        }

        /* 参数表单容器 */
        .param-form-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }

        .param-form-container .param-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .param-form-container .param-item label {
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .param-form-container .param-item input {
            padding: 8px 12px;
            background: var(--bg-glass);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 13px;
            transition: all 0.2s;
        }

        .param-form-container .param-item input:focus {
            outline: none;
            border-color: var(--accent-blue);
            background: var(--bg-elevated);
        }

        .param-form-container .param-item select {
            padding: 8px 12px;
            background: var(--bg-glass);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 13px;
            transition: all 0.2s;
            cursor: pointer;
        }

        .param-form-container .param-item select:focus {
            outline: none;
            border-color: var(--accent-blue);
            background: var(--bg-elevated);
        }

        .param-form-container .param-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--accent-blue);
        }

        .param-form-container .param-item.param-checkbox {
            flex-direction: row;
            align-items: center;
            gap: 8px;
        }

        .param-form-container .param-item.param-checkbox label {
            margin-bottom: 0;
        }

        /* 操作按钮 */
        .detail-actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid var(--border-color);
        }

        .btn-detail {
            flex: 1;
            padding: 14px 24px;
            border-radius: var(--radius-md);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-detail-primary {
            background: var(--accent-green);
            border: none;
            color: white;
        }

        .btn-detail-primary:hover {
            background: #0d9668;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);
        }

        .btn-detail-danger {
            background: var(--accent-red);
            border: none;
            color: white;
        }

        .btn-detail-danger:hover {
            background: #dc2626;
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4);
        }

        .btn-detail-secondary {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
        }

        .btn-detail-secondary:hover {
            border-color: var(--accent-blue);
        }

        /* 兼容旧样式 */
        .strategy-item {
            background: var(--bg-glass);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 20px;
            margin-bottom: 16px;
            transition: all 0.3s ease;
        }

        .strategy-item:last-child { margin-bottom: 0; }
        .strategy-item:hover { border-color: rgba(255, 255, 255, 0.15); }

        .strategy-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .strategy-name { font-weight: 600; font-size: 15px; }

        .strategy-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .strategy-badge.running {
            background: rgba(16, 185, 129, 0.15);
            color: var(--accent-green);
        }

        .strategy-badge.stopped {
            background: rgba(107, 114, 128, 0.15);
            color: var(--text-muted);
        }

        /* 表格 */
        .orders-table {
            width: 100%;
            border-collapse: collapse;
        }

        .orders-table th,
        .orders-table td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        .orders-table th {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .orders-table td {
            font-size: 14px;
        }

        .btn-cancel {
            padding: 6px 12px;
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: var(--radius-sm);
            color: var(--accent-red);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-cancel:hover {
            background: rgba(239, 68, 68, 0.25);
        }

        /* 动画 */
        .animate-in {
            animation: fadeInUp 0.5s ease forwards;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; }

        /* 策略详情展开面板 - 嵌入式 */
        .strategy-detail-panel {
            display: none;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
            padding: 20px;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .strategy-detail-panel.active {
            display: block;
        }

        .strategy-detail-panel .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .strategy-detail-panel .panel-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .strategy-detail-panel .panel-close {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 18px;
            padding: 4px 8px;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .strategy-detail-panel .panel-close:hover {
            background: var(--bg-card-hover);
            color: var(--text-primary);
        }

        .strategy-detail-panel .panel-content {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        .strategy-detail-panel .indicator-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin: 16px 0;
        }

        .strategy-detail-panel .indicator-box {
            background: var(--bg-glass);
            border-radius: var(--radius-sm);
            padding: 12px;
            text-align: center;
        }

        .strategy-detail-panel .indicator-label {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .strategy-detail-panel .indicator-value {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .strategy-detail-panel .param-form {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-top: 16px;
        }

        .strategy-detail-panel .param-item {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .strategy-detail-panel .param-item label {
            font-size: 12px;
            color: var(--text-muted);
        }

        .strategy-detail-panel .param-item input,
        .strategy-detail-panel .param-item select {
            background: var(--bg-glass);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            padding: 8px 12px;
            color: var(--text-primary);
            font-size: 13px;
        }

        .strategy-detail-panel .param-presets {
            display: flex;
            gap: 8px;
            margin: 12px 0;
        }

        .strategy-detail-panel .param-preset-btn {
            padding: 6px 16px;
            border: 1px solid var(--border-color);
            border-radius: 16px;
            background: var(--bg-glass);
            color: var(--text-secondary);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .strategy-detail-panel .param-preset-btn:hover,
        .strategy-detail-panel .param-preset-btn.active {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
            color: white;
        }

        /* 策略详情视图样式 */
        .strategy-detail-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .strategy-detail-icon {
            width: 56px;
            height: 56px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: white;
        }

        .strategy-detail-title h3 {
            margin: 0 0 8px 0;
            font-size: 20px;
            font-weight: 600;
        }

        .strategy-detail-content {
            max-height: calc(100vh - 300px);
            overflow-y: auto;
        }

        .detail-section {
            margin-bottom: 24px;
        }

        .detail-section-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .detail-section-title i {
            color: var(--accent-blue);
        }

        .detail-text {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.7;
            margin: 0;
        }

        .detail-box {
            background: var(--bg-secondary);
            border-radius: var(--radius-sm);
            padding: 16px;
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.8;
            white-space: pre-line;
        }

        .detail-box.suitable {
            border-left: 3px solid var(--accent-green);
        }

        .detail-box.risk {
            border-left: 3px solid var(--accent-yellow);
            background: rgba(245, 158, 11, 0.1);
        }

        /* 模态框 - 保留但不用 */
        .modal-overlay {
            display: none;
        }
        .modal-title { font-size: 1.25rem; font-weight: 600; }
        .modal-close {
            background: none; border: none;
            color: var(--text-secondary);
            font-size: 1.5rem; cursor: pointer;
        }
        .modal-close:hover { color: var(--text-primary); }
        .param-group { margin-bottom: 16px; }
        .param-label {
            display: block; color: var(--text-secondary);
            font-size: 0.875rem; margin-bottom: 6px;
        }
        .param-input {
            width: 100%; padding: 10px 12px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            color: var(--text-primary); font-size: 0.95rem;
        }
        .param-input:focus { outline: none; border-color: var(--accent-blue); }
        .param-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .indicator-box {
            background: var(--bg-secondary);
            border-radius: var(--radius-sm);
            padding: 12px; margin-bottom: 12px;
        }
        .indicator-name { color: var(--text-secondary); font-size: 0.875rem; }
        .indicator-value { color: var(--accent-blue); font-size: 1.25rem; font-weight: 600; }
        .modal-footer {
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid var(--border-color);
            display: flex; gap: 12px; justify-content: flex-end;
        }
        .btn-modal {
            padding: 10px 20px;
            border-radius: var(--radius-sm);
            border: none; cursor: pointer;
            font-weight: 500; transition: all 0.3s;
        }
        .btn-modal-primary {
            background: var(--accent-blue); color: white;
        }
        .btn-modal-primary:hover { background: #2563eb; }
        .btn-modal-secondary {
            background: var(--bg-secondary); color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        /* 响应式设计 - 移动端适配 */
        @media (max-width: 768px) {
            /* 移动端菜单按钮 */
            .mobile-menu-btn {
                display: flex !important;
                position: fixed;
                top: 16px;
                left: 16px;
                z-index: 200;
                width: 44px;
                height: 44px;
                background: rgba(255, 255, 255, 0.75);
                border: 1px solid var(--border-color);
                border-radius: var(--radius-md);
                align-items: center;
                justify-content: center;
                cursor: pointer;
                box-shadow: var(--shadow-lg);
            }

            /* 侧边栏移动端适配 */
            .sidebar {
                transform: translateX(-100%);
                transition: transform 0.3s ease;
                width: 280px;
            }

            .sidebar.mobile-open {
                transform: translateX(0);
            }

            .sidebar-overlay {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0, 0, 0, 0.5);
                z-index: 99;
            }

            .sidebar-overlay.mobile-open {
                display: block;
            }

            /* 主内容移动端 */
            .main-content {
                margin-left: 0;
                padding: 80px 16px 32px;
            }

            .page-header h1 {
                font-size: 24px;
            }

            /* 标签页移动端 */
            .nav-tabs-custom {
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
                padding-bottom: 12px;
            }

            .tab-btn {
                padding: 10px 16px;
                font-size: 13px;
                white-space: nowrap;
            }

            /* 策略网格移动端 - 2列 */
            .strategies-grid {
                grid-template-columns: repeat(2, 1fr);
                min-width: 0;
                gap: 10px;
            }

            /* 策略卡片移动端 - 紧凑 */
            .strategy-card {
                margin-bottom: 0;
                display: flex;
                flex-direction: column;
            }

            .strategy-card-header {
                padding: 10px;
                gap: 8px;
                min-height: auto;
            }

            .strategy-icon {
                width: 32px;
                height: 32px;
                font-size: 16px;
            }

            .strategy-card-title {
                font-size: 12px;
                gap: 4px;
            }

            .strategy-card-name {
                font-size: 12px;
            }

            .strategy-status-badge {
                font-size: 8px;
                padding: 2px 5px;
            }

            .strategy-card-symbol {
                font-size: 9px;
            }

            .strategy-card-body {
                padding: 8px 10px;
                flex: 1;
            }

            .strategy-desc {
                display: none;
            }

            .strategy-stats-grid {
                grid-template-columns: 1fr 1fr;
                gap: 4px;
            }

            .strategy-stat {
                padding: 5px 6px;
            }

            .strategy-stat-label {
                font-size: 8px;
            }

            .strategy-stat-value {
                font-size: 11px;
            }

            .strategy-params-summary {
                gap: 3px;
                flex-wrap: wrap;
            }

            .param-tag {
                font-size: 9px;
                padding: 1px 4px;
            }

            .strategy-card-footer {
                padding: 8px 10px;
            }

            .strategy-card-footer .btn-action {
                padding: 6px 8px;
                font-size: 11px;
                height: 32px;
            }

            .strategy-card-footer .btn-action i {
                font-size: 12px;
            }

            .strategy-card-expand {
                display: none;
            }

            /* 表单移动端 */
            .param-form-container {
                grid-template-columns: 1fr;
            }

            .param-item {
                padding: 12px;
            }

            .param-presets {
                flex-wrap: wrap;
            }

            .param-preset-btn {
                padding: 8px 12px;
                font-size: 12px;
            }

            /* 模态框移动端 */
            .strategy-detail-modal {
                width: 100%;
                max-width: 100%;
                margin: 0;
                border-radius: 16px 16px 0 0;
                max-height: 90vh;
                bottom: 0;
                top: auto;
            }

            .detail-section {
                padding: 16px;
            }

            .stats-summary {
                grid-template-columns: 1fr;
                gap: 12px;
            }

            .btn-save {
                width: 100%;
            }

            /* 市场数据网格 */
            .market-grid {
                grid-template-columns: 1fr;
            }

            .market-card {
                padding: 16px;
            }

            /* 日志列表移动端 */
            .logs-list {
                gap: 8px;
            }

            .log-item {
                padding: 12px;
                flex-direction: column;
                gap: 8px;
            }

            .log-info {
                flex-direction: column;
                gap: 4px;
            }

            /* 买入卖出表单移动端 */
            .trade-form {
                padding: 16px;
            }

            .trade-grid {
                grid-template-columns: 1fr;
                gap: 12px;
            }

            .amount-btn {
                padding: 8px;
                font-size: 12px;
            }
        }

        /* 平板适配 */
        @media (min-width: 769px) and (max-width: 1024px) {
            .strategies-grid {
                grid-template-columns: 1fr;
            }

            .sidebar {
                width: 220px;
            }

            .main-content {
                margin-left: 220px;
                padding: 24px;
            }
        }

        /* 默认隐藏移动端菜单按钮 */
        .mobile-menu-btn {
            display: none;
        }
    </style>
</head>
<body>
    <!-- 移动端菜单按钮 -->
    <button class="mobile-menu-btn" onclick="toggleMobileMenu()">
        <i class="bi bi-list" style="font-size: 24px;"></i>
    </button>

    <!-- 移动端遮罩层 -->
    <div class="sidebar-overlay" onclick="toggleMobileMenu()"></div>

    <!-- 侧边栏 -->
    <nav class="sidebar">
        <div class="sidebar-logo">
            <div class="sidebar-logo-icon">
                <i class="bi bi-graph-up text-white"></i>
            </div>
            <div>
                <h5>TradingBot</h5>
            </div>
        </div>
        <ul class="nav flex-column sidebar-nav">
            <li class="nav-item">
                <a class="nav-link" href="/">
                    <i class="bi bi-grid-1x2"></i>
                    <span>仪表盘</span>
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link active" href="/trading">
                    <i class="bi bi-cart4"></i>
                    <span>交易</span>
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="/settings">
                    <i class="bi bi-gear"></i>
                    <span>设置</span>
                </a>
            </li>
        </ul>
    </nav>

    <!-- 主内容 -->
    <main class="main-content">
        <div class="page-header animate-in">
            <h1>交易</h1>
            <p class="subtitle">执行交易和管理订单</p>
        </div>

        <!-- 标签页 -->
        <div class="nav-tabs-custom animate-in delay-1">
            <button class="tab-btn active" onclick="switchTab('manual', this)">
                <i class="bi bi-lightning"></i>手动交易
            </button>
            <button class="tab-btn" onclick="switchTab('strategies', this)">
                <i class="bi bi-cpu"></i>策略交易
            </button>
            <button class="tab-btn" onclick="switchTab('orders', this)">
                <i class="bi bi-list-ul"></i>订单管理
            </button>
        </div>

        <!-- 手动交易 -->
        <div id="tab-manual" class="tab-content animate-in delay-2">
            <div class="row g-4">
                <!-- 交易面板 -->
                <div class="col-lg-4">
                    <div class="glass-card trade-panel">
                        <div class="trade-panel-header">
                            <div class="trade-panel-icon">
                                <i class="bi bi-lightning text-white"></i>
                            </div>
                            <div>
                                <div class="trade-panel-title">快速交易</div>
                                <div class="trade-panel-subtitle">市价单 / 限价单</div>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">交易对</label>
                            <select class="form-select" id="trade-symbol">
                                {% for symbol in symbols %}
                                <option value="{{ symbol }}">{{ symbol }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="current-price-display">
                            <div class="price-label">当前价格</div>
                            <div class="price-value" id="current-price">-</div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">订单类型</label>
                            <select class="form-select" id="order-type">
                                <option value="market">市价单</option>
                                <option value="limit">限价单</option>
                            </select>
                        </div>

                        <div class="mb-3" id="limit-price-group" style="display: none;">
                            <label class="form-label">限价价格</label>
                            <input type="number" class="form-control" id="limit-price" step="0.01" placeholder="输入价格">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">数量</label>
                            <input type="number" class="form-control" id="trade-amount" step="0.0001" placeholder="输入数量">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">金额 (USDT)</label>
                            <input type="number" class="form-control" id="trade-value" step="0.01" placeholder="输入金额">
                        </div>

                        <div class="trade-buttons">
                            <button class="btn-trade btn-buy" onclick="placeOrder('buy')">
                                <i class="bi bi-arrow-up-circle"></i>买入
                            </button>
                            <button class="btn-trade btn-sell" onclick="placeOrder('sell')">
                                <i class="bi bi-arrow-down-circle"></i>卖出
                            </button>
                        </div>
                    </div>
                </div>

                <!-- 市场信息 -->
                <div class="col-lg-8">
                    <div class="glass-card market-panel mb-4">
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <h5 style="font-weight: 600; display: flex; align-items: center; gap: 10px;">
                                <i class="bi bi-graph-up" style="color: var(--accent-purple);"></i>
                                实时行情
                            </h5>
                            <select class="form-select w-auto" id="market-symbol" style="min-width: 140px;">
                                {% for symbol in symbols %}
                                <option value="{{ symbol }}">{{ symbol }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="market-stats">
                            <div class="stat-item">
                                <div class="stat-label">最新价</div>
                                <div class="stat-value" id="market-price">-</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-label">24h最高</div>
                                <div class="stat-value" id="market-high">-</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-label">24h最低</div>
                                <div class="stat-value" id="market-low">-</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-label">24h成交量</div>
                                <div class="stat-value" id="market-volume">-</div>
                            </div>
                        </div>
                    </div>

                    <div class="glass-card position-panel">
                        <div class="position-header">
                            <i class="bi bi-briefcase"></i>
                            当前持仓
                        </div>
                        <div id="position-info">
                            <div class="empty-state">
                                <i class="bi bi-inbox"></i>
                                <p>暂无持仓</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 策略交易 -->
        <div id="tab-strategies" class="tab-content" style="display: none;">
            <div class="glass-card animate-in" style="padding: 0; overflow: hidden;">
                <!-- 策略列表视图 -->
                <div id="strategy-list-view">
                    <div class="strategy-list-header">
                        <div>
                            <h4><i class="bi bi-robot"></i> 量化策略</h4>
                            <p>选择策略查看详情和参数配置</p>
                        </div>
                        <button class="btn-action" onclick="loadStrategies()">
                            <i class="bi bi-arrow-clockwise"></i> 刷新
                        </button>
                    </div>
                    <div id="strategies-list" class="strategy-list-grid">
                        <div class="empty-state">
                            <i class="bi bi-robot"></i>
                            <p>加载中...</p>
                        </div>
                    </div>
                </div>

                <!-- 策略详情视图 -->
                <div id="strategy-detail-view" style="display: none;">
                    <div class="strategy-detail-header">
                        <button class="btn-back" onclick="showStrategyList()">
                            <i class="bi bi-arrow-left"></i> 返回策略列表
                        </button>
                        <div class="strategy-detail-title">
                            <div class="strategy-detail-icon" id="detail-icon">
                                <i class="bi bi-gear-fill"></i>
                            </div>
                            <div>
                                <h3 id="detail-title">策略名称</h3>
                                <span class="strategy-status-badge stopped" id="detail-status">已停止</span>
                            </div>
                        </div>
                    </div>
                    <div class="strategy-detail-content" id="detail-content">
                        <!-- 动态内容 -->
                    </div>
                </div>
            </div>
        </div>

        <!-- 订单管理 -->
        <div id="tab-orders" class="tab-content" style="display: none;">
            <div class="glass-card" style="padding: 24px;">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h5 style="font-weight: 600; display: flex; align-items: center; gap: 10px;">
                        <i class="bi bi-list-ul" style="color: var(--accent-blue);"></i>
                        订单记录
                    </h5>
                </div>
                <ul class="nav nav-tabs mb-3" style="border-bottom: 1px solid var(--border-color);">
                    <li class="nav-item">
                        <a class="nav-link active" href="#" onclick="showOrderTab('open', this)" style="color: var(--text-secondary);">未完成订单</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="showOrderTab('history', this)" style="color: var(--text-secondary);">历史记录</a>
                    </li>
                </ul>
                <div id="open-orders-list">
                    <div class="empty-state">
                        <i class="bi bi-inbox"></i>
                        <p>暂无未完成订单</p>
                    </div>
                </div>
                <div id="history-orders-list" style="display: none;">
                    <div class="empty-state">
                        <i class="bi bi-clock-history"></i>
                        <p>暂无历史订单</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let currentSymbol = 'ETHUSDT';
        let currentPrice = 0;

        document.addEventListener('DOMContentLoaded', function() {
            loadMarketData(currentSymbol);
            loadStrategies();
            loadOpenOrders();
            setInterval(() => loadMarketData(currentSymbol), 10000);
        });

        // 移动端菜单切换
        function toggleMobileMenu() {
            document.querySelector('.sidebar').classList.toggle('mobile-open');
            document.querySelector('.sidebar-overlay').classList.toggle('mobile-open');
        }

        function switchTab(tab, btn) {
            document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById('tab-' + tab).style.display = 'block';
            if (btn) {
                btn.classList.add('active');
            } else {
                document.querySelector(`.tab-btn[onclick*="switchTab('${tab}')"]`)?.classList.add('active');
            }
        }

        function showOrderTab(tab, link) {
            if (link) {
                link.preventDefault();
            }
            document.querySelectorAll('#tab-orders .nav-link').forEach(el => el.classList.remove('active'));
            if (link) {
                link.target.classList.add('active');
            } else {
                document.querySelector(`#tab-orders a[onclick*="showOrderTab('${tab}')"]`)?.classList.add('active');
            }

            if (tab === 'open') {
                document.getElementById('open-orders-list').style.display = 'block';
                document.getElementById('history-orders-list').style.display = 'none';
            } else {
                document.getElementById('open-orders-list').style.display = 'none';
                document.getElementById('history-orders-list').style.display = 'block';
            }
        }

        async function loadMarketData(symbol) {
            try {
                const response = await fetch(`/api/market/${symbol}`);
                const data = await response.json();

                if (data.success) {
                    const ticker = data.ticker;
                    currentPrice = ticker.last;

                    const change = ticker.change_percent || 0;
                    const priceEl = document.getElementById('current-price');
                    priceEl.textContent = formatPrice(ticker.last);
                    priceEl.className = 'price-value ' + (change >= 0 ? 'up' : 'down');

                    document.getElementById('market-price').textContent = formatPrice(ticker.last);
                    document.getElementById('market-high').textContent = formatPrice(ticker.high);
                    document.getElementById('market-low').textContent = formatPrice(ticker.low);
                    document.getElementById('market-volume').textContent = formatVolume(ticker.quote_volume);
                }
            } catch (error) {
                console.error('加载市场数据失败:', error);
            }
        }

        async function loadStrategies() {
            try {
                const response = await fetch('/api/strategies');
                const data = await response.json();

                if (data.success) {
                    currentStrategies = data.strategies;
                    renderStrategies(data.strategies);
                }
            } catch (error) {
                console.error('加载策略失败:', error);
            }
        }

        // 策略配置
        const strategyConfig = {
            'GridStrategy': {
                name: '网格策略',
                icon: 'grid',
                iconClass: 'bi-grid-3x3-gap-fill',
                desc: '震荡行情中低买高卖',
                color: '#667eea'
            },
            'DCAStrategy': {
                name: '定投策略',
                icon: 'dca',
                iconClass: 'bi-calendar-check-fill',
                desc: '定期定额，平均成本',
                color: '#11998e'
            },
            'TrendStrategy': {
                name: '趋势策略',
                icon: 'trend',
                iconClass: 'bi-trending-up-fill',
                desc: 'MACD/RSI趋势跟随',
                color: '#f5576c'
            },
            'FundingArbitrageStrategy': {
                name: '资金费率套利',
                icon: 'funding',
                iconClass: 'bi-currency-exchange',
                desc: '利用资金费率获取稳定收益',
                color: '#4facfe'
            },
            'ScalpingStrategy': {
                name: '剥头皮',
                icon: 'scalping',
                iconClass: 'bi-lightning-charge-fill',
                desc: '短期波动快速盈利',
                color: '#fa709a'
            },
            'AdaptiveStrategy': {
                name: '自适应',
                icon: 'adaptive',
                iconClass: 'bi-shuffle',
                desc: 'ADX切换趋势/震荡模式',
                color: '#f59e0b'
            }
        };

        // 策略详细信息
        const strategyDetails = {

        // Toast 通知函数
        function showToast(type, title, message, duration = 3000) {
            let container = document.querySelector('.toast-container');
            if (!container) {
                container = document.createElement('div');
                container.className = 'toast-container';
                document.body.appendChild(container);
            }

            const iconMap = {
                'success': 'bi-check-circle-fill',
                'error': 'bi-x-circle-fill',
                'info': 'bi-info-circle-fill'
            };

            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.innerHTML = `
                <i class="bi ${iconMap[type]} toast-icon"></i>
                <div class="toast-content">
                    <div class="toast-title">${title}</div>
                    <div class="toast-message">${message}</div>
                </div>
                <button class="toast-close" onclick="this.parentElement.remove()">
                    <i class="bi bi-x"></i>
                </button>
            `;

            container.appendChild(toast);

            // 自动移除
            setTimeout(() => {
                toast.style.animation = 'toast-out 0.3s ease forwards';
                setTimeout(() => toast.remove(), 300);
            }, duration);
        }

        async function startStrategy(name) {
            const typeMap = {
                'GridStrategy': 'grid',
                'DCAStrategy': 'dca',
                'TrendStrategy': 'trend',
                'FundingArbitrageStrategy': 'funding',
                'ScalpingStrategy': 'scalping',
                'AdaptiveStrategy': 'adaptive'
            };

            const btn = event.target.closest('.btn-action.start');
            const originalHtml = btn ? btn.innerHTML : '';
            if (btn) {
                btn.innerHTML = '<i class="bi bi-arrow-repeat spin"></i> 启动中';
                btn.disabled = true;
            }

            try {
                const response = await fetch('/api/strategy', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'start',
                        strategy_type: typeMap[name],
                        params: { symbol: currentSymbol }
                    })
                });
                const data = await response.json();

                if (data.success) {
                    showToast('success', '策略启动成功', `${name} 已开始运行`);
                    loadStrategies();
                } else {
                    showToast('error', '启动失败', data.error || '未知错误');
                    if (btn) {
                        btn.innerHTML = originalHtml;
                        btn.disabled = false;
                    }
                }
            } catch (error) {
                showToast('error', '启动失败', error.message || '网络错误');
                if (btn) {
                    btn.innerHTML = originalHtml;
                    btn.disabled = false;
                }
            }
        }
